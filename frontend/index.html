<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ATL24 Bathymetry Cleaner</title>
  </head>
  <body>
    <div id="app">
      <section class="left-column">
        <section class="control-column">
          <header class="app-title">
            <h1>ATL24 Bathymetry Cleaner</h1>
            <p id="segment-count">Loading</p>
          </header>
          <section class="setup-panel" id="setup-panel">
            <label>
              Input
              <input id="input-dir" type="text" placeholder="/absolute/path/to/ATL24_folder" autocomplete="off" />
            </label>
            <label>
              Output
              <input id="output-dir" type="text" placeholder="/absolute/path/to/ATL24_folder_labeled" autocomplete="off" />
            </label>
            <label id="dem-path-label">
              DEM GeoTIFF
              <input id="dem-path" type="text" placeholder="/absolute/path/to/reference_dem.tif" autocomplete="off" />
            </label>
            <button type="button" id="load-session">Load</button>
          </section>
          <section class="toolbar" aria-label="Label controls">
            <div class="class-buttons" id="class-buttons" role="group" aria-label="Active label mode"></div>
            <div class="actions">
              <button type="button" id="show-classifications" aria-pressed="true">Color by Class</button>
              <button type="button" id="show-dem" aria-pressed="false" disabled>Show DEM</button>
              <button type="button" id="run-proposal">Suggest Labels</button>
              <button type="button" id="reset-atl24">Reset to ATL24</button>
              <button type="button" id="save-labels">Save Cleaned H5</button>
              <button type="button" id="clear-selection" disabled>Clear selection</button>
            </div>
            <div class="slider-grid">
              <label>
                Size
                <input id="point-size" type="range" min="2" max="9" step="1" value="4" />
              </label>
              <label>
                Opacity
                <input id="point-opacity" type="range" min="0.15" max="1" step="0.05" value="0.82" />
              </label>
            </div>
          </section>
          <section class="status-row">
            <div id="active-segment">No beam selected</div>
            <div id="status"></div>
          </section>
        </section>
        <section class="picker-column">
          <section class="picker-pane">
            <h2 id="file-heading">Files</h2>
            <div id="file-list" class="segment-list"></div>
          </section>
          <section class="picker-pane">
            <h2 id="beam-heading">Beams</h2>
            <div id="beam-list" class="segment-list"></div>
          </section>
        </section>
      </section>
      <section class="workspace-column">
        <section class="map-column">
          <div id="map" class="map-panel"></div>
        </section>
        <section class="profile-row">
          <div id="profile" class="profile-panel"></div>
          <button type="button" id="sync-with-map" class="profile-sync-button" aria-pressed="false" disabled>
            Sync with Map
          </button>
        </section>
      </section>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
