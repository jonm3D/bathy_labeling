<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ATL24 Smart Labeler</title>
  </head>
  <body>
    <div id="app">
      <aside class="sidebar">
        <header class="app-title">
          <h1>ATL24 Smart Labeler</h1>
          <p id="segment-count">Loading</p>
        </header>
        <div class="segment-lists">
          <section>
            <h2>To Label</h2>
            <div id="segments-open" class="segment-list"></div>
          </section>
          <section>
            <h2>Labeled</h2>
            <div id="segments-complete" class="segment-list"></div>
          </section>
        </div>
      </aside>
      <main class="workspace">
        <section class="toolbar" aria-label="Label controls">
          <div class="class-buttons" id="class-buttons" role="group" aria-label="Active label mode">
            <button type="button" data-label="surface">Surface</button>
            <button type="button" data-label="bathy">Bathy</button>
            <button type="button" data-label="land">Land</button>
            <button type="button" data-label="noise">Noise</button>
            <button type="button" data-label="ambiguous">Ambiguous</button>
          </div>
          <div class="actions">
            <button type="button" id="run-proposal">Run Proposal</button>
            <button type="button" id="import-atl24">Import ATL24</button>
            <button type="button" id="accept-proposal">Accept Proposal</button>
            <button type="button" id="save-labels">Done</button>
          </div>
          <label>
            Size
            <input id="point-size" type="range" min="2" max="9" step="1" value="4" />
          </label>
          <label>
            Opacity
            <input id="point-opacity" type="range" min="0.15" max="1" step="0.05" value="0.82" />
          </label>
        </section>
        <section class="status-row">
          <div id="active-segment">No segment selected</div>
          <div id="status"></div>
        </section>
        <section class="viewer-grid">
          <div id="profile" class="profile-panel"></div>
          <div id="map" class="map-panel"></div>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
